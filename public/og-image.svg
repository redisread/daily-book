<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4a853"/>
      <stop offset="100%" stop-color="#e8c97a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- decorative orbs -->
  <circle cx="150" cy="120" r="200" fill="#d4a853" opacity="0.06"/>
  <circle cx="1050" cy="520" r="180" fill="#0f3460" opacity="0.4"/>

  <!-- book icon -->
  <rect x="80" y="220" width="180" height="240" rx="12" fill="url(#accent)"/>
  <text x="170" y="360" text-anchor="middle" font-size="110" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">📖</text>

  <!-- title -->
  <text x="320" y="290" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="76" font-weight="700" fill="#ffffff">每日一书</text>
  <text x="322" y="360" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="38" font-weight="400" fill="#d4a853">Daily Book · 每天推荐一本好书</text>
  <text x="322" y="430" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30" font-weight="400" fill="#a0aec0">附带精选金句，让阅读成为习惯</text>

  <!-- divider -->
  <rect x="322" y="470" width="120" height="4" rx="2" fill="url(#accent)"/>
  <text x="320" y="520" font-family="'PingFang SC', sans-serif" font-size="24" fill="#718096">daily-book.pages.dev</text>
</svg>
