name: Deploy to Production

on:
  push:
    branches: [main]
  schedule:
    # 每天 00:00 中国时间 (UTC 16:00)
    - cron: '0 16 * * *'
  workflow_dispatch: # 手动触发

env:
  TZ: Asia/Shanghai # 确保日期计算使用中国时区

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: YAML validation
        run: npm run yaml-check

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        # critical 漏洞阻断；high 仅作 astro 上游参考
        run: npm audit --audit-level=critical

  deploy:
    needs: [quality, security]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "Build output directory 'dist' not found"
            exit 1
          fi
          echo "Build size: $(du -sh dist | cut -f1)"

      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(du -sm dist | cut -f1)
          WARN_SIZE=5
          FAIL_SIZE=10
          echo "Bundle size: ${BUNDLE_SIZE}MB"
          if [ "$BUNDLE_SIZE" -ge "$FAIL_SIZE" ]; then
            echo "❌ Bundle size exceeds failure threshold!"
            exit 1
          elif [ "$BUNDLE_SIZE" -ge "$WARN_SIZE" ]; then
            echo "⚠️ Bundle size exceeds warning threshold"
          else
            echo "✅ Bundle size OK"
          fi

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
